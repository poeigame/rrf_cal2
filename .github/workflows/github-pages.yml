name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Resolve Pages path
        id: resolve_path
        shell: bash
        run: |
          if [ -d "python_backend/gh-pages" ]; then
            echo "site_path=python_backend/gh-pages" >> "$GITHUB_OUTPUT"
          elif [ -d "gh-pages" ]; then
            echo "site_path=gh-pages" >> "$GITHUB_OUTPUT"
          else
            echo "No Pages directory found. Expected python_backend/gh-pages or gh-pages"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.resolve_path.outputs.site_path }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
